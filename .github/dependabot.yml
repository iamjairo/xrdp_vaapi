version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: deps(python)
    groups:
      python-all:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: deps(npm)
    groups:
      react-ecosystem:
        patterns:
          - react
          - react-dom
          - react-icons
          - "@testing-library/*"
        update-types:
          - minor
          - patch
      npm-misc:
        patterns:
          - "*"
        exclude-patterns:
          - react
          - react-dom
          - react-icons
          - "@testing-library/*"
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: deps(actions)
    groups:
      github-actions-all:
        patterns:
          - "*"
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: deps(docker)
    groups:
      docker-backend:
        patterns:
          - "*"
  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: deps(docker)
    groups:
      docker-frontend:
        patterns:
          - "*"
